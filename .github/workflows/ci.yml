name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-macos
            os: macos-14
          - target: x86_64-macos
            os: macos-14
          - target: x86_64-linux-musl
            os: ubuntu-latest
          - target: aarch64-linux-musl
            os: ubuntu-latest
          - target: x86_64-windows-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Verify Zig version
        run: zig version

      - name: Build
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe

      - name: Test (native only)
        if: matrix.target == 'x86_64-linux-musl' || matrix.target == 'aarch64-macos'
        run: zig build test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blitz-${{ matrix.target }}
          path: |
            zig-out/bin/blitz*
          if-no-files-found: warn
